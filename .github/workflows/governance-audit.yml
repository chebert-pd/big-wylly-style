name: Governance audit (reusable)

on:
  workflow_call:
    inputs:
      scope:
        description: "Path to audit (relative to repo root)"
        type: string
        required: true
      all:
        description: "Audit all TSX/JSX, not just files importing @chebert-pd/ui"
        type: boolean
        default: false
      mode:
        description: "Rule applicability scope: ds | consumer (default: auto-detected)"
        type: string
        default: ""
      changed-only:
        description: "Limit to files changed in this PR (no-op on push to main)"
        type: boolean
        default: true
      package-manager:
        description: "Package manager: npm | pnpm | yarn"
        type: string
        default: "npm"
      build-command:
        description: "Optional command to run before the audit (e.g. building the auditor in a monorepo)"
        type: string
        default: ""
      node-version:
        description: "Node.js version"
        type: string
        default: "20"
      format:
        description: "Output format: github (default, posts PR annotations) | sarif | json"
        type: string
        default: "github"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}

      - name: Install pnpm
        if: inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: |
          case "${{ inputs.package-manager }}" in
            npm)  npm ci ;;
            pnpm) pnpm install --frozen-lockfile ;;
            yarn) yarn install --frozen-lockfile ;;
            *)    echo "Unsupported package manager: ${{ inputs.package-manager }}" && exit 2 ;;
          esac

      - name: Build (optional)
        if: inputs.build-command != ''
        run: ${{ inputs.build-command }}

      - name: Run governance audit
        run: |
          ARGS="--scope ${{ inputs.scope }} --format ${{ inputs.format }}"
          if [ "${{ inputs.all }}" = "true" ]; then ARGS="$ARGS --all"; fi
          if [ -n "${{ inputs.mode }}" ]; then ARGS="$ARGS --mode ${{ inputs.mode }}"; fi
          if [ "${{ inputs.changed-only }}" = "true" ] && [ "${{ github.event_name }}" = "pull_request" ]; then
            ARGS="$ARGS --changed-only --base-ref origin/${{ github.base_ref }}"
          fi
          if [ -f node_modules/@chebert-pd/ui/dist/cli/audit-governance.js ]; then
            BIN_PATH=node_modules/@chebert-pd/ui/dist/cli/audit-governance.js
          elif [ -f packages/wyllo-ui/dist/cli/audit-governance.js ]; then
            BIN_PATH=packages/wyllo-ui/dist/cli/audit-governance.js
          else
            echo "Could not locate audit-governance bin" >&2
            exit 2
          fi
          node "$BIN_PATH" $ARGS

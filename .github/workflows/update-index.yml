name: Update Codebase Index

on:
  push:
    branches: [main]
    paths:
      - "packages/wyllo-ui/src/components/**"
  workflow_dispatch:

jobs:
  update-index:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run codebase indexer
        run: python .claude/skills/codebase-index/scripts/index_codebase.py ./packages/wyllo-ui

      - name: Create PR if index changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/wyllo-ui/src/components/.ai/

          # Check if there are any staged changes
          if ! git diff --staged --quiet; then
            # Create a new branch for this update
            BRANCH="chore/update-index-$(date +%s)"
            git checkout -b "$BRANCH"
            git commit -m "chore: update codebase index"
            git push origin "$BRANCH"

            # Create a PR
            gh pr create \
              --title "chore: update codebase index" \
              --body "Automated codebase index update from workflow" \
              --base main \
              --head "$BRANCH"
          fi

name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  typecheck-wyllo-ui:
    name: Typecheck @chebert-pd/ui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck
        working-directory: packages/wyllo-ui

  test-wyllo-ui:
    name: Test @chebert-pd/ui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        working-directory: packages/wyllo-ui

  typecheck-gallery:
    name: Typecheck gallery
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck
        working-directory: apps/gallery

  governance-audit-ui:
    name: Governance audit — @chebert-pd/ui
    uses: ./.github/workflows/governance-audit.yml
    with:
      scope: packages/wyllo-ui/src/components
      all: true
      mode: ds
      changed-only: true
      build-command: npm run build --workspace=packages/wyllo-ui

  governance-audit-gallery:
    name: Governance audit — gallery
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/governance-audit.yml
    with:
      scope: apps/gallery
      changed-only: true
      build-command: npm run build --workspace=packages/wyllo-ui

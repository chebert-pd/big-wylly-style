name: Publish @chebert-pd/ui

on:
  push:
    tags:
      - "wyllo-ui@*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@chebert-pd'

      - name: Install dependencies
        run: npm ci
        working-directory: packages/wyllo-ui

      - name: Build
        run: npm run build
        working-directory: packages/wyllo-ui

      - name: Publish
        run: npm publish
        working-directory: packages/wyllo-ui
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
